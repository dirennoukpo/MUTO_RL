# SKRL PPO — MUTO-RS Push Recovery
# Réseau MLP 512→256→128 pour policy et value function
# Input : 70 dims | Output policy : 18 dims | Output value : 1 dim

seed: 42

# ─── Modèles ──────────────────────────────────────────────────────────────────
models:
  policy:
    class: GaussianMixin
    clip_actions: true
    clip_log_std: true
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: net
        input: STATES
        layers: [512, 256, 128]
        activations: elu
    output: ACTIONS

  value:
    class: DeterministicMixin
    clip_actions: false
    network:
      - name: net
        input: STATES
        layers: [512, 256, 128]
        activations: elu
    output: ONE

# ─── Agent PPO ────────────────────────────────────────────────────────────────
agent:
  class: PPO
  rollouts: 24
  learning_epochs: 5
  mini_batches: 4

  discount_factor: 0.99
  lambda: 0.95

  learning_rate: 3.0e-4
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.008

  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs: ~
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: ~

  random_timesteps: 0
  learning_starts: 0

  grad_norm_clip: 1.0
  ratio_clip: 0.2
  value_clip: 0.2
  clip_predicted_values: true

  entropy_loss_scale: 0.005
  value_loss_scale: 1.0

  kl_threshold: 0.0

  rewards_shaper_scale: 0.01
directory: muto_rs_locomotion
experiment_name: phase1_locomotion

# ─── Trainer ──────────────────────────────────────────────────────────────────
trainer:
  timesteps: 10000000  # locomotion nécessite plus que push recovery


# ─── Notes de tuning ──────────────────────────────────────────────────────────
# Robot ne se stabilise pas après ~500k steps :
#   → Augmenter base_orientation weight dans muto_rl_env_cfg.py (2.0 → 4.0)
#   → Mettre joint_torques weight à 0.0 temporairement
#   → entropy_loss_scale: 0.005 → 0.02
#
# Robot tremble (actions oscillantes) :
#   → Augmenter action_rate weight (0.1 → 0.5)
#   → Augmenter Kd dans muto_rs_robot_cfg.py (0.5 → 1.0)
#
# Robot apprend à tomber lentement (exploite 'alive') :
#   → Réduire alive weight (1.0 → 0.5)
#   → Ajouter RewTerm is_terminated weight=-2.0 dans RewardsCfg
