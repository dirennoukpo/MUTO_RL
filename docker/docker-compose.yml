services:
  ros-dev:
    container_name: ${CONTAINER_NAME}
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        WORKING_DIR: ${WORKING_DIR}
    env_file:
      - ./config/.env.base    # variables système (commitables)
      - ./config/.env.user    # secrets utilisateur (NON commitables)
    volumes:
      - ${USER_HOME}:${USER_HOME}:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev:/dev
      # Persistance de l'état Tailscale entre redémarrages
      - tailscale-state:/var/lib/tailscale
      # Accès au TUN kernel (requis si TS_USERSPACE=false)
      - /dev/net/tun:/dev/net/tun
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - DISPLAY=${MY_DISPLAY}
      - WORKING_DIR=${WORKING_DIR}
      - DOMAIN_ID=${DOMAIN_ID}
      - LOCALHOST_ONLY=${LOCALHOST_ONLY}
      - ROS_DOMAIN_ID=${DOMAIN_ID}
      - ROS_LOCALHOST_ONLY=${LOCALHOST_ONLY}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION}
      - ROBOT_ROLE=${ROBOT_ROLE}
      - TARGET_IP=${TARGET_IP}
      - TS_HOSTNAME=${TS_HOSTNAME}
      - TS_ACCEPT_ROUTES=${TS_ACCEPT_ROUTES}
      - TS_ADVERTISE_EXIT_NODE=${TS_ADVERTISE_EXIT_NODE}
      - MUTO_LINK_CPP_REPO=${MUTO_LINK_CPP_REPO}
      - MUTO_LINK_CPP_REF=${MUTO_LINK_CPP_REF}
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true
    working_dir: ${WORKING_DIR}
    restart: unless-stopped

volumes:
  tailscale-state:
    driver: local